services:
  - type: web
    name: nivix-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nivix.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: OPENROUTER_API_KEY
        value: "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"
      - key: FORCE_LLM
        value: "true"
