services:
  - type: web
    name: nivix-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nivix.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: OPENROUTER_API_KEY
        value: ""
